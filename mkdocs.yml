site_name: Lödningskurs

repo_url: https://github.com/uppsala-makerspace/loedningskurs
edit_uri: blob/main/docs/


nav:
  - Main page: index.md
  - Böcker: books/README.md
  - Kapitel:
    - Översiktet: chapters/README.md
    - 0. Att förbera: chapters/0_setup/README.md
    - 1. Din första lödning: chapters/1_first_solder/README.md
    - Förord: chapters/foreword/README.md
  - Misc:
    - Att hjälpa med: CONTRIBUTING.md
    - Beteendekod: CODE_OF_CONDUCT.md
    - Kontakta oss: contact_us.md
    - Skripter: scripts/README.md

not_in_nav: |
  scripts/build/*.md
  chapters/front_pages/*

theme:
  name: material
  greetings: Välkommen till lödningskursen
  font:
    text: Lato
    code: JetBrains Mono
  palette:
    primary: black

  logo: logo/loedningskurs_logo.png

  features:
    - toc.integrate
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.footer
#    - navigation.expand
    - search.suggest
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.action.edit
    - content.action.view
      
markdown_extensions:
  - toc:
      toc_depth: 2
      permalink: true
      permalink_title: Anchor link to this section for reference
  - admonition
  - tables
  - attr_list
  - footnotes
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.keys
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
      
